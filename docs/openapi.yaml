openapi: 3.0.3
info:
  title: VeloShop API
  version: 0.1.0
  description: API dla serwisów sklepu rowerowego VeloShop.
servers:
  - url: http://localhost:4001
    description: User Service
  - url: http://localhost:3002
    description: Product Service
  - url: http://localhost:4003
    description: Order Service
  - url: http://localhost:4005
    description: Repair Service
  - url: http://localhost:4006
    description: Payment Service
tags:
  - name: User Service
  - name: Product Service
  - name: Order Service
  - name: Repair Service
  - name: Payment Service
security:
  - bearerAuth: []
paths:
  /health:
    get:
      tags:
        - User Service
        - Product Service
        - Order Service
        - Repair Service
        - Payment Service
      summary: Status serwisu
      security: []
      responses:
        "200":
          description: Serwis działa
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /auth/register:
    servers:
      - url: http://localhost:4001
    post:
      tags:
        - User Service
      summary: Rejestracja użytkownika
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
            example:
              login: janek
              firstName: Jan
              lastName: Kowalski
              email: jan@example.com
              password: haslo123
      responses:
        "201":
          description: Konto utworzone
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
  /auth/login:
    servers:
      - url: http://localhost:4001
    post:
      tags:
        - User Service
      summary: Logowanie użytkownika
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            examples:
              user:
                value:
                  login: user
                  password: user
              admin:
                value:
                  login: admin
                  password: admin
      responses:
        "200":
          description: Zalogowano
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /users/me:
    servers:
      - url: http://localhost:4001
    get:
      tags:
        - User Service
      summary: Dane zalogowanego użytkownika
      responses:
        "200":
          description: Dane konta
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /products:
    servers:
      - url: http://localhost:3002
    get:
      tags:
        - Product Service
      summary: Lista produktów
      security: []
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: category
          in: query
          required: false
          schema:
            type: string
        - name: minPrice
          in: query
          required: false
          schema:
            type: number
        - name: maxPrice
          in: query
          required: false
          schema:
            type: number
        - name: available
          in: query
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: Lista produktów
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      tags:
        - Product Service
      summary: Dodanie produktu
      description: Endpoint administracyjny.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Produkt utworzony
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
  /products/categories:
    servers:
      - url: http://localhost:3002
    get:
      tags:
        - Product Service
      summary: Kategorie produktów
      security: []
      responses:
        "200":
          description: Lista kategorii
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
  /products/{id}:
    servers:
      - url: http://localhost:3002
    get:
      tags:
        - Product Service
      summary: Szczegóły produktu
      security: []
      parameters:
        - $ref: "#/components/parameters/ProductId"
      responses:
        "200":
          description: Produkt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      tags:
        - Product Service
      summary: Usunięcie produktu
      description: Endpoint administracyjny.
      parameters:
        - $ref: "#/components/parameters/ProductId"
      responses:
        "200":
          description: Produkt usunięty
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResponse"
  /products/{id}/reserve:
    servers:
      - url: http://localhost:3002
    post:
      tags:
        - Product Service
      summary: Rezerwacja produktu
      security: []
      parameters:
        - $ref: "#/components/parameters/ProductId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReserveProductRequest"
      responses:
        "200":
          description: Produkt po rezerwacji
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
  /products/{id}/stock:
    servers:
      - url: http://localhost:3002
    patch:
      tags:
        - Product Service
      summary: Zmiana stanu magazynowego
      description: Endpoint administracyjny.
      parameters:
        - $ref: "#/components/parameters/ProductId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProductStockRequest"
      responses:
        "200":
          description: Produkt po zmianie stanu
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
  /payments/process:
    servers:
      - url: http://localhost:4006
    post:
      tags:
        - Payment Service
      summary: Przetworzenie płatności
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentProcessRequest"
      responses:
        "200":
          description: Wynik płatności
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentProcessResponse"
  /orders:
    servers:
      - url: http://localhost:4003
    get:
      tags:
        - Order Service
      summary: Lista zamówień
      description: Klient widzi własne zamówienia, administrator widzi wszystkie.
      responses:
        "200":
          description: Lista zamówień
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags:
        - Order Service
      summary: Złożenie zamówienia
      description: Rezerwuje produkty w Product Service i inicjuje płatność w Payment Service.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderRequest"
            example:
              items:
                - productId: 3
                  quantity: 1
              deliveryAddress: ul. Rowerowa 1, Warszawa
              paymentMethod: card
      responses:
        "201":
          description: Zamówienie utworzone
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"
  /orders/{id}:
    servers:
      - url: http://localhost:4003
    get:
      tags:
        - Order Service
      summary: Szczegóły zamówienia
      parameters:
        - $ref: "#/components/parameters/OrderId"
      responses:
        "200":
          description: Zamówienie
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /orders/{id}/status:
    servers:
      - url: http://localhost:4003
    patch:
      tags:
        - Order Service
      summary: Zmiana statusu zamówienia
      description: Endpoint administracyjny.
      parameters:
        - $ref: "#/components/parameters/OrderId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrderStatusRequest"
            example:
              status: shipped
      responses:
        "200":
          description: Zaktualizowane zamówienie
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /orders/{id}/retry-payment:
    servers:
      - url: http://localhost:4003
    post:
      tags:
        - Order Service
      summary: Ponowienie płatności
      description: Dla zamówień ze statusem failed — ponowna rezerwacja i próba płatności bez tworzenia nowego zamówienia.
      parameters:
        - $ref: "#/components/parameters/OrderId"
      responses:
        "200":
          description: Zaktualizowane zamówienie
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /repair-services:
    servers:
      - url: http://localhost:4005
    get:
      tags:
        - Repair Service
      summary: Lista typów napraw
      security: []
      responses:
        "200":
          description: Typy napraw
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RepairService"
  /repair-calendar:
    servers:
      - url: http://localhost:4005
    get:
      tags:
        - Repair Service
      summary: Kalendarz dostępności napraw
      security: []
      parameters:
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date
          example: "2026-06-02"
        - name: days
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 60
          example: 21
      responses:
        "200":
          description: Dostępność dni
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CalendarDay"
  /repair-estimate:
    servers:
      - url: http://localhost:4005
    post:
      tags:
        - Repair Service
      summary: Wycena terminu odbioru
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RepairEstimateRequest"
            example:
              repairServiceId: 4
              dropOffDate: "2026-06-02"
      responses:
        "200":
          description: Szacowany termin odbioru
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RepairEstimateResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  /repairs:
    servers:
      - url: http://localhost:4005
    get:
      tags:
        - Repair Service
      summary: Lista zleceń napraw
      description: Klient widzi własne zlecenia, administrator widzi wszystkie.
      responses:
        "200":
          description: Lista zleceń
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Repair"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags:
        - Repair Service
      summary: Złożenie zlecenia naprawy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRepairRequest"
            example:
              bikeDescription: Rower trekkingowy
              issueDescription: Problem z hamulcami
              repairServiceId: 2
              dropOffDate: "2026-06-02"
      responses:
        "201":
          description: Zlecenie utworzone
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Repair"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags:
        - Repair Service
      summary: Usunięcie wszystkich zleceń napraw
      description: Endpoint administracyjny.
      responses:
        "200":
          description: Liczba usuniętych zleceń
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: integer
                    example: 3
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /repairs/{id}:
    servers:
      - url: http://localhost:4005
    get:
      tags:
        - Repair Service
      summary: Szczegóły zlecenia naprawy
      parameters:
        - $ref: "#/components/parameters/RepairId"
      responses:
        "200":
          description: Zlecenie naprawy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Repair"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /repairs/{id}/status:
    servers:
      - url: http://localhost:4005
    patch:
      tags:
        - Repair Service
      summary: Zmiana statusu zlecenia
      description: Endpoint administracyjny.
      parameters:
        - $ref: "#/components/parameters/RepairId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRepairStatusRequest"
            example:
              status: completed
      responses:
        "200":
          description: Zaktualizowane zlecenie
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Repair"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    RepairId:
      name: id
      in: path
      required: true
      schema:
        type: integer
      example: 1
    OrderId:
      name: id
      in: path
      required: true
      schema:
        type: integer
      example: 1
    ProductId:
      name: id
      in: path
      required: true
      schema:
        type: integer
      example: 1
  responses:
    BadRequest:
      description: Nieprawidłowe dane
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Brak lub nieprawidłowy token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Brak uprawnień
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Nie znaleziono zasobu
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Konflikt danych
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
          example: user-service
    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          example: Nieprawidłowy login lub hasło
    DeleteResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Produkt zostal usuniety.
    Product:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Rower górski Kross Hexagon
        description:
          type: string
          example: Rower do jazdy terenowej.
        price:
          type: number
          example: 2499
        imageUrl:
          type: string
          example: https://images.unsplash.com/photo-1485965120184-e220f721d03e?w=500
        category:
          type: string
          example: Rowery
        stock:
          type: integer
          example: 5
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    ProductInput:
      type: object
      required:
        - name
        - price
        - category
      properties:
        name:
          type: string
          example: Rower miejski
        description:
          type: string
          example: Wygodny rower do miasta.
        price:
          type: number
          example: 1899
        imageUrl:
          type: string
          example: https://images.unsplash.com/photo-1485965120184-e220f721d03e?w=500
        category:
          type: string
          example: Rowery
        stock:
          type: integer
          example: 4
    ReserveProductRequest:
      type: object
      required:
        - quantity
      properties:
        quantity:
          type: integer
          minimum: 1
          example: 1
    UpdateProductStockRequest:
      type: object
      required:
        - stock
      properties:
        stock:
          type: integer
          minimum: 0
          example: 8
    PaymentProcessRequest:
      type: object
      required:
        - amount
      properties:
        orderId:
          type: integer
          example: 1
        repairId:
          type: integer
          example: 1
        amount:
          type: number
          example: 249
    PaymentProcessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        transactionId:
          type: string
          example: TXN-ABC123XYZ
        message:
          type: string
          example: Płatność zrealizowana pomyślnie.
    RegisterRequest:
      type: object
      required:
        - firstName
        - lastName
        - email
        - password
      properties:
        login:
          type: string
          description: Opcjonalny login. Jesli nie zostanie podany, loginem bedzie email.
          minLength: 3
          maxLength: 40
          pattern: "^[a-z0-9._-]+$"
          example: janek
        firstName:
          type: string
          maxLength: 60
          example: Jan
        lastName:
          type: string
          maxLength: 60
          example: Kowalski
        email:
          type: string
          format: email
          maxLength: 254
          example: jan@example.com
        password:
          type: string
          format: password
          minLength: 8
          maxLength: 128
          example: haslo123
    LoginRequest:
      type: object
      required:
        - password
      properties:
        login:
          type: string
          description: Login albo email.
          example: user
        email:
          type: string
          format: email
          description: Alternatywa dla pola login.
          example: user@user.user
        password:
          type: string
          format: password
          example: user
    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"
    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        login:
          type: string
          example: user
        firstName:
          type: string
          example: Klient
        lastName:
          type: string
          example: Testowy
        email:
          type: string
          format: email
          example: user@user.user
        role:
          type: string
          enum:
            - customer
            - admin
          example: customer
    RepairService:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Przegląd standardowy
        description:
          type: string
          example: Kontrola napędu, kół, hamulców i dokręcenie osprzętu.
        durationHours:
          type: integer
          example: 4
        price:
          type: number
          example: 149
    CalendarDay:
      type: object
      properties:
        date:
          type: string
          format: date
          example: "2026-06-02"
        workingDay:
          type: boolean
          example: true
        bookedHours:
          type: integer
          example: 4
        freeHours:
          type: integer
          example: 4
    RepairEstimateRequest:
      type: object
      required:
        - repairServiceId
        - dropOffDate
      properties:
        repairServiceId:
          type: integer
          example: 4
        dropOffDate:
          type: string
          format: date
          example: "2026-06-02"
    RepairEstimateResponse:
      type: object
      properties:
        durationHours:
          type: integer
          example: 12
        readyDate:
          type: string
          format: date
          example: "2026-06-03"
        plan:
          type: array
          items:
            $ref: "#/components/schemas/RepairPlanItem"
    RepairPlanItem:
      type: object
      properties:
        date:
          type: string
          format: date
          example: "2026-06-02"
        hours:
          type: integer
          example: 8
    CreateRepairRequest:
      type: object
      required:
        - bikeDescription
        - issueDescription
        - repairServiceId
        - dropOffDate
      properties:
        bikeDescription:
          type: string
          example: Rower trekkingowy
        issueDescription:
          type: string
          example: Problem z hamulcami
        repairServiceId:
          type: integer
          example: 2
        dropOffDate:
          type: string
          format: date
          example: "2026-06-02"
    Repair:
      type: object
      properties:
        id:
          type: integer
          example: 1
        userId:
          type: integer
          example: 1
        userEmail:
          type: string
          format: email
          example: user@user.user
        productId:
          type: integer
          nullable: true
          example: null
        bikeDescription:
          type: string
          example: Rower trekkingowy
        issueDescription:
          type: string
          example: Problem z hamulcami
        dropOffDate:
          type: string
          format: date
          example: "2026-06-02"
        readyDate:
          type: string
          format: date
          example: "2026-06-03"
        plannedHours:
          type: integer
          example: 12
        status:
          $ref: "#/components/schemas/RepairStatus"
        RepairServiceId:
          type: integer
          example: 4
        RepairService:
          $ref: "#/components/schemas/RepairService"
    RepairStatus:
      type: string
      enum:
        - booked
        - accepted
        - in_progress
        - ready
        - completed
        - cancelled
      example: booked
    UpdateRepairStatusRequest:
      type: object
      required:
        - status
      properties:
        status:
          $ref: "#/components/schemas/RepairStatus"
    CreateOrderRequest:
      type: object
      required:
        - items
        - deliveryAddress
        - paymentMethod
      properties:
        items:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/OrderItemInput"
        deliveryAddress:
          type: string
          example: ul. Rowerowa 1, Warszawa
        paymentMethod:
          type: string
          example: card
    OrderItemInput:
      type: object
      required:
        - productId
        - quantity
      properties:
        productId:
          type: integer
          example: 3
        quantity:
          type: integer
          minimum: 1
          example: 1
    Order:
      type: object
      properties:
        id:
          type: integer
          example: 1
        userId:
          type: integer
          example: 1
        userEmail:
          type: string
          format: email
          example: user@user.user
        deliveryAddress:
          type: string
          example: ul. Rowerowa 1, Warszawa
        paymentMethod:
          type: string
          example: card
        status:
          $ref: "#/components/schemas/OrderStatus"
        totalAmount:
          type: number
          example: 249
        paymentTransactionId:
          type: string
          nullable: true
          example: TXN-ABC123XYZ
        paymentMessage:
          type: string
          nullable: true
          example: Płatność zrealizowana pomyślnie.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        OrderItems:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
    OrderItem:
      type: object
      properties:
        id:
          type: integer
          example: 1
        productId:
          type: integer
          example: 3
        productName:
          type: string
          example: Kask Abus Macator
        quantity:
          type: integer
          example: 1
        unitPrice:
          type: number
          example: 249
        OrderId:
          type: integer
          example: 1
    OrderStatus:
      type: string
      enum:
        - pending
        - paid
        - failed
        - shipped
        - completed
        - cancelled
      example: paid
    UpdateOrderStatusRequest:
      type: object
      required:
        - status
      properties:
        status:
          $ref: "#/components/schemas/OrderStatus"
